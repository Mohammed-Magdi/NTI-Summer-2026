<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Home</title>
</head>
<body>

  <h2>Add User</h2>
  
  <form id="userForm">
    <p>
      <label for="firstName">First Name:</label><br />
      <input type="text" id="firstName" required />
    </p>

    <p>
      <label for="lastName">Last Name:</label><br />
      <input type="text" id="lastName" required />
    </p>

    <p>
      <label for="age">Age:</label><br />
      <input type="number" id="age" min="1" required />
    </p>

    <p>
      <label for="isGraduated">Is Graduated?</label>
      <input type="checkbox" id="isGraduated" />
    </p>

    <p>
      <button type="submit" id="submitBtn">Add Entry</button>
      <button type="button" id="cancelBtn" style="display: none;">Cancel Edit</button>
    </p>
  </form>

  <hr />

  <h2>User List</h2>
  
  <table border="1" cellpadding="9" cellspacing="0">
    <thead>
      <tr>
        <th>First Name</th>
        <th>Last Name</th>
        <th>Age</th>
        <th>Graduated</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="userTableBody">
      <tr id="emptyRow">
        <td colspan="5"></td>
      </tr>
    </tbody>
  </table>




  <script src="main.js"></script>


  
</body>
</html>
